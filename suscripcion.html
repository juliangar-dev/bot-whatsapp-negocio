<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RespondIA — Activar suscripción</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #0f1117;
            --surface: #181c27;
            --border:  #252a38;
            --accent:  #00c97a;
            --text-1:  #f0f2f8;
            --text-2:  #8b91a8;
            --danger:  #ff4d6d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
        }
        .logo {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.4px;
            margin-bottom: 8px;
        }
        p {
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .precio {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .precio-label { font-size: 13px; color: var(--text-2); }
        .precio-valor { font-size: 22px; font-weight: 600; color: var(--text-1); }
        .precio-valor span { font-size: 13px; color: var(--text-2); font-weight: 400; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
            margin-bottom: 7px;
        }
        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-1);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.15s;
        }
        input:focus { border-color: var(--accent); }

        button {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        button:hover { opacity: 0.88; }
        button:disabled { opacity: 0.45; cursor: not-allowed; }

        .nota {
            font-size: 11px;
            color: var(--text-2);
            text-align: center;
            margin-top: 16px;
            line-height: 1.5;
        }
        .error {
            display: none;
            background: #ff4d6d18;
            border: 1px solid #ff4d6d44;
            color: var(--danger);
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 7px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <div class="dot"></div>
        RespondIA
    </div>

    <h1>Activá tu suscripción</h1>
    <p>Tu bot de WhatsApp queda activo mientras tu suscripción esté vigente. Podés cancelar cuando quieras.</p>

    <div class="precio">
        <span class="precio-label">Plan mensual</span>
        <span class="precio-valor">$15.000 <span>ARS / mes</span></span>
    </div>

    <div class="error" id="error-msg"></div>

    <label>Tu email de Mercado Pago</label>
    <input type="email" id="email" placeholder="ejemplo@gmail.com">

    <button id="btn-pagar" onclick="pagar()">
        Ir a pagar con Mercado Pago →
    </button>

    <p class="nota">
        🔒 El pago es procesado de forma segura por Mercado Pago.<br>
        RespondIA nunca accede a tus datos de tarjeta.
    </p>
</div>

<script>
    const negocioId = window.location.pathname.split("/").pop();

    async function pagar() {
        const email = document.getElementById("email").value.trim();
        const errorEl = document.getElementById("error-msg");
        errorEl.style.display = "none";

        if (!email || !email.includes("@")) {
            errorEl.textContent = "Ingresá un email válido de Mercado Pago.";
            errorEl.style.display = "block";
            return;
        }

        const btn = document.getElementById("btn-pagar");
        btn.disabled = true;
        btn.textContent = "Generando link de pago...";

        try {
            const res = await fetch(`/crear-suscripcion/${negocioId}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });
            const data = await res.json();

            if (!res.ok) {
                errorEl.textContent = data.error || "Error al generar el pago.";
                errorEl.style.display = "block";
                return;
            }

            window.location.href = data.init_point;

        } catch (e) {
            errorEl.textContent = "Error de conexión. Intentá de nuevo.";
            errorEl.style.display = "block";
        } finally {
            btn.disabled = false;
            btn.textContent = "Ir a pagar con Mercado Pago →";
        }
    }
</script>

</body>
</html>
