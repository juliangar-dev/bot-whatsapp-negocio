<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurá tu bot de WhatsApp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #25D366;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: #25D366;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #1da851;
        }
        label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>⚙️ Configurá tu bot de WhatsApp</h1>

    <label>Nombre del negocio</label>
    <input type="text" id="nombre" placeholder="Ej: Peluquería Carlos">

    <label>Ubicación</label>
    <input type="text" id="ubicacion" placeholder="Ej: Buenos Aires">

    <label>Horario</label>
    <input type="text" id="horario" placeholder="Ej: Lunes a sábado de 9 a 20hs">

    <label>Servicios y precios (uno por línea, formato: Servicio - $precio)</label>
    <textarea id="servicios" rows="5" placeholder="Corte de pelo - $3000&#10;Corte y barba - $4500&#10;Afeitado - $2000"></textarea>

    <label>Nombre del dueño o contacto</label>
    <input type="text" id="contacto" placeholder="Ej: Carlos">

    <br>
    <button onclick="guardar()">Guardar configuración</button>

    <script>
        function guardar() {
            const nombre = document.getElementById("nombre").value;
            const ubicacion = document.getElementById("ubicacion").value;
            const horario = document.getElementById("horario").value;
            const serviciosRaw = document.getElementById("servicios").value;
            const contacto = document.getElementById("contacto").value;

            const servicios = serviciosRaw.split("\n").map(linea => {
                const partes = linea.split(" - $");
                return { nombre: partes[0], precio: parseInt(partes[1]) };
            });

            const datos = { nombre, ubicacion, horario, servicios, turnos: "No es necesario, se atiende por orden de llegada", contacto };

            fetch("/guardar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(datos)
            })
            .then(res => res.json())
            .then(data => alert(data.mensaje))
            .catch(err => alert("Error al guardar"));
        }
    </script>
</body>
</html>
